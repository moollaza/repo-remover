version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 3
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "major"
          - "minor"
          - "patch"
      dev-tooling:
        dependency-type: "development"
        update-types:
          - "major"
          - "minor"
          - "patch"
    ignore:
      # Type definitions — no runtime impact, only noise
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@octokit/graphql-schema"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Test tooling — no production impact
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@playwright/test"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "msw"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Formatting/linting — no production impact
      - dependency-name: "prettier"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "eslint-config-prettier"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      # Dev tooling — no production impact
      - dependency-name: "husky"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "lint-staged"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "shadcn"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
    commit-message:
      prefix: "fix"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
