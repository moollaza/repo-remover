<!doctype html>
<html lang="en" class="min-h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

    <title>Repo Remover — The Bulk Cleanup GitHub Should Have Built</title>
    <meta name="description" content="25,000+ developers use Repo Remover to review, archive, and delete GitHub repos in bulk. Free, open source, and your token never leaves your browser." />
    <link rel="canonical" href="https://reporemover.xyz/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reporemover.xyz/" />
    <meta property="og:title" content="Repo Remover — The Bulk Cleanup GitHub Should Have Built" />
    <meta property="og:description" content="25,000+ developers use Repo Remover to review, archive, and delete GitHub repos in bulk. Free, open source, and your token never leaves your browser." />
    <meta property="og:site_name" content="Repo Remover" />
    <meta property="og:image" content="https://reporemover.xyz/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Repo Remover — The bulk cleanup tool GitHub should have built" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Repo Remover — The Bulk Cleanup GitHub Should Have Built" />
    <meta name="twitter:description" content="25,000+ developers use Repo Remover to review, archive, and delete GitHub repos in bulk. Free, open source, and your token never leaves your browser." />
    <meta name="twitter:image" content="https://reporemover.xyz/images/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Repo Remover",
        "url": "https://reporemover.xyz",
        "description": "Review every repo in one table, then archive or delete in bulk. Runs in your browser and sends your token straight to GitHub.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "browserRequirements": "Requires a modern browser with JavaScript enabled",
        "softwareHelp": {
          "@type": "CreativeWork",
          "url": "https://github.com/moollaza/repo-remover"
        },
        "isAccessibleForFree": true
      }
    </script>

    <!-- FAQ Structured Data (keep in sync with src/components/landing/faq-section.tsx) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Repo Remover really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Repo Remover is completely free and open source. There are no hidden fees, premium tiers, or paid features."
            }
          },
          {
            "@type": "Question",
            "name": "Is my data safe? Do you store my GitHub credentials?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Completely safe. Your token is only ever used in your browser to call the GitHub API — it's never sent to any server, logged, or stored anywhere outside your device."
            }
          },
          {
            "@type": "Question",
            "name": "Can I undo deletions or archiving?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Archiving is fully reversible — you can unarchive repositories anytime through GitHub. However, deletions are permanent. That's why we show a confirmation dialog with username verification before any deletion."
            }
          },
          {
            "@type": "Question",
            "name": "Does this work with organization repositories?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Repo Remover works with both personal and organization repositories, as long as your token has the necessary permissions."
            }
          },
          {
            "@type": "Question",
            "name": "How many repositories can I manage at once?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "There's no limit. Whether you have 10 or 1,000+ repositories, Repo Remover handles them all with search, filtering, and pagination."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to install anything?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Repo Remover runs entirely in your browser. Just visit the site, paste your GitHub Personal Access Token, and start cleaning up."
            }
          }
        ]
      }
    </script>

    <!-- Preconnect to GitHub API (saves ~100-200ms on first API call) -->
    <link rel="preconnect" href="https://api.github.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.github.com" />

    <!-- Prevent flash of wrong theme (class-based dark mode) -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme:dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="min-h-full bg-background text-foreground font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
